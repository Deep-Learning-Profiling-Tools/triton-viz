# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  TRITON_NIGHTLY_INDEX_URL: https://aiinfra.pkgs.visualstudio.com/PublicPackages/_packaging/Triton-Nightly/pypi/simple/

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        path: 'triton_viz'

    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: '3.12'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Lint with pre-commit
      run: |
        cd triton_viz
        pip install pre-commit
        pre-commit run --all-files

    - name: Install Dependencies
      run: |
        cd triton_viz
        uv sync --extra test

    - name: Upgrade Triton to nightly
      run: |
        cd triton_viz
        uv pip uninstall -y triton pytorch-triton || true
        uv pip install --pre -U --force-reinstall --index-url "$TRITON_NIGHTLY_INDEX_URL" triton
        uv run python - <<'PY'
        import importlib.metadata as md
        import triton
        import triton.language.target_info as target_info

        print("triton version:", triton.__version__)
        print("triton file:", triton.__file__)
        print("target_info file:", target_info.__file__)
        print("triton distributions:", md.packages_distributions().get("triton"))
        print("has is_hip_gfx1250:", hasattr(target_info, "is_hip_gfx1250"))
        assert hasattr(target_info, "is_hip_gfx1250")
        PY
        uv pip install "git+https://github.com/triton-lang/triton.git#subdirectory=python/triton_kernels"

    - name: Run frontend tests
      run: |
        cd triton_viz
        npm install
        npm run test:frontend

    - name: Test with pytest
      run: |
        cd triton_viz
        uv run pytest tests -n auto --triton-kernels-device=cpu

    - name: Install Triton-Viz with NKI extras
      run: |
        cd triton_viz
        uv sync --extra test --extra nki

    - name: Upgrade Triton to nightly (NKI)
      run: |
        cd triton_viz
        uv pip uninstall -y triton pytorch-triton || true
        uv pip install --pre -U --force-reinstall --index-url "$TRITON_NIGHTLY_INDEX_URL" triton
        uv run python - <<'PY'
        import importlib.metadata as md
        import triton
        import triton.language.target_info as target_info

        print("triton version:", triton.__version__)
        print("triton file:", triton.__file__)
        print("target_info file:", target_info.__file__)
        print("triton distributions:", md.packages_distributions().get("triton"))
        print("has is_hip_gfx1250:", hasattr(target_info, "is_hip_gfx1250"))
        assert hasattr(target_info, "is_hip_gfx1250")
        PY
        uv pip install "git+https://github.com/triton-lang/triton.git#subdirectory=python/triton_kernels"

    - name: Run full (Triton + NKI) pytest suite
      run: |
        cd triton_viz
        uv run pytest tests -m "" -n auto --triton-kernels-device=cpu

  test-pip-install:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: '3.12'

    - name: Install with pip
      run: pip install -e ".[test]"

    - name: Verify installation
      run: python -c "import triton_viz; print(triton_viz.__version__)"
